<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Impostor Game</title>
<style>
body { margin:0; font-family:Arial; background:#111; color:white; text-align:center; overflow:hidden; }
.screen { display:none; height:100vh; padding:20px; box-sizing:border-box; }
.active { display:flex; flex-direction:column; justify-content:center; align-items:center; }
button { padding:15px 20px; font-size:18px; border:none; border-radius:10px; margin-top:20px; }
.grid { display:grid; grid-template-columns:repeat(2,1fr); grid-template-rows:repeat(4,1fr); gap:10px; height:80%; width:100%; }
.player { background:#222; display:flex; align-items:center; justify-content:center; font-size:20px; border-radius:10px; }

.reveal-box {
    background:#222;
    border-radius:15px;
    padding:40px;
    font-size:28px;
    width:80%;
    max-width:400px;
    display:flex;
    align-items:center;
    justify-content:center;
}
</style>
</head>
<body>

<div id="setup" class="screen active">
<h1>Impostor Game</h1>
<select id="players"></select><br><br>
<select id="impostors"></select><br><br>
<button onclick="startGame()">Start Game</button>
</div>

<div id="game" class="screen">
<h2>Select Player</h2>
<div id="grid" class="grid"></div>
</div>

<div id="reveal" class="screen">
<div id="revealBox" class="reveal-box">Tap to reveal</div>
<button onclick="nextPlayer()">OK</button>
</div>

<div id="waiting" class="screen">
<h2>Game in progress...</h2>
<button onclick="endGame()">End Game</button>
</div>

<div id="end" class="screen">
<h2 id="result"></h2>
<button onclick="location.reload()">Restart</button>
</div>

<script>
let totalPlayers, impostorCount;
let revealed = [];
let players = [];
let word = "";
let currentPlayerIndex = null;
let hasRevealed = false;

async function fetchWord() {
    const res = await fetch('words.txt');
    const text = await res.text();
    const words = text.split('\n').filter(w => w.trim() !== "");
    return words[Math.floor(Math.random()*words.length)];
}

async function startGame() {
    totalPlayers = parseInt(document.getElementById('players').value);
    impostorCount = parseInt(document.getElementById('impostors').value);

    revealed = Array(totalPlayers).fill(false);
    word = await fetchWord();

    players = Array(totalPlayers).fill("normal");

    let chosen = new Set();
    while(chosen.size < impostorCount) {
        chosen.add(Math.floor(Math.random()*totalPlayers));
    }
    chosen.forEach(i => players[i] = "impostor");

    setupGrid();
    showScreen('game');
}

function setupGrid() {
    const grid = document.getElementById('grid');
    grid.innerHTML = "";

    players.forEach((_, i) => {
        if(revealed[i]) return;

        const div = document.createElement('div');
        div.className = 'player';
        div.innerText = 'Player ' + (i+1);
        div.onclick = () => selectPlayer(i);
        grid.appendChild(div);
    });
}

function selectPlayer(i) {
    currentPlayerIndex = i;
    hasRevealed = false;
    document.getElementById('revealBox').innerText = 'Tap to reveal';
    document.getElementById('revealBox').onclick = revealWord;
    showScreen('reveal');
}

function revealWord() {
    const role = players[currentPlayerIndex];
    document.getElementById('revealBox').innerText = role === 'impostor' ? 'IMPOSTOR' : word;
    document.getElementById('revealBox').onclick = null;
    hasRevealed = true;
}

function nextPlayer() {
    // Only mark as revealed if the word was actually shown
    if(hasRevealed) {
        revealed[currentPlayerIndex] = true;
    }

    if(revealed.every(v => v)) {
        showScreen('waiting');
    } else {
        setupGrid();
        showScreen('game');
    }
} else {
        setupGrid();
        showScreen('game');
    }
}

function endGame() {
    let impostors = [];
    players.forEach((p,i) => {
        if(p === 'impostor') impostors.push('Player ' + (i+1));
    });

    document.getElementById('result').innerText =
        'Impostor(s): ' + impostors.join(', ') + '\nWord: ' + word;

    showScreen('end');
}

function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

function initDropdowns() {
    const playerSelect = document.getElementById('players');
    const impostorSelect = document.getElementById('impostors');

    for(let i=3;i<=9;i++) {
        const opt = document.createElement('option');
        opt.value = i;
        opt.text = i + ' Players';
        playerSelect.appendChild(opt);
    }

    playerSelect.onchange = () => {
        const val = parseInt(playerSelect.value);
        impostorSelect.innerHTML = '';

        let maxImpostors = Math.floor(val / 3);
        if(maxImpostors < 1) maxImpostors = 1;

        for(let i=1;i<=maxImpostors;i++) {
            const opt = document.createElement('option');
            opt.value = i;
            opt.text = i + ' Impostor' + (i>1?'s':'');
            impostorSelect.appendChild(opt);
        }
    };

    playerSelect.value = 3;
    playerSelect.onchange();
}

document.addEventListener('DOMContentLoaded', initDropdowns);
</script>

</body>
</html>
